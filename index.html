<script>
  (async () => {
    const params = new URLSearchParams(window.location.search);
    const agency = params.get("agency") || "isl";
    const report = params.get("report") || (agency + "q3");
    const res = await fetch(
      `https://script.google.com/macros/s/AKfycbwB-RGI1lVHrUE03PkkSEYbLuiTLxE4phMBBOm81diNJtSPyUWGoB_bOlkgFIoVF4yzLQ/exec?report=${report}&t=${Date.now()}`
    );
    window.ISL_REPORT = await res.json();
    window.ISL_REPORT.__agency = agency;
    window.ISL_REPORT.__reportKey = report;
  })();
</script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
