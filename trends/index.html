<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Performance Trends &amp; Projections</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../editorial.css" />
  <link rel="icon" type="image/svg+xml" href="../favicon-gear.svg" />
  <style>
    .trends-wrap { max-width: var(--col); margin: 0 auto; padding: 48px 32px 96px; }
    @media (max-width: 768px) { .trends-wrap { padding: 32px 20px 64px; } }

    .t-section { margin-bottom: 64px; }
    .t-section-head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; border-top: 1px solid var(--rule); padding-top: 14px; margin-bottom: 28px; }
    .t-section-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); font-family: var(--sans); }
    .t-section-title { font-family: var(--serif); font-size: 26px; letter-spacing: -0.02em; color: var(--ink); margin-bottom: 4px; }
    .t-section-sub { font-size: 13px; color: var(--ink-3); font-family: var(--sans); }
    .t-badge { font-size: 11px; font-family: var(--sans); color: var(--ink-3); padding: 4px 12px; white-space: nowrap; align-self: flex-start; }

.trends-hero { margin-bottom: 56px; padding-top: 24px; }
    .hero-progress-pill { display: inline-flex; align-items: center; gap: 8px; }
    .hero-progress-track { width: 80px; height: 3px; background: var(--rule); border-radius: 99px; overflow: hidden; }
    .hero-progress-fill { height: 100%; background: var(--isl-blue); border-radius: 99px; transition: width .6s ease; }

    .proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1px; background: var(--rule); }
    .proj-card { background: var(--paper); padding: 24px 20px; display: flex; flex-direction: column; gap: 0; }
    .proj-card-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); font-family: var(--sans); margin-bottom: 14px; }
    .proj-number { font-family: var(--serif); font-size: 40px; line-height: 1; letter-spacing: -0.03em; color: var(--ink); margin-bottom: 2px; }
    .proj-number-sub { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); font-family: var(--sans); margin-bottom: 16px; }
    .proj-range strong { color: var(--ink); }
    .proj-progress-wrap { margin-bottom: 16px; }
    .proj-progress-track { height: 3px; background: var(--rule); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
    .proj-progress-fill { height: 100%; background: var(--isl-blue); border-radius: 99px; transition: width .6s ease; }
    .proj-progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-3); font-family: var(--sans); }
    .proj-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--rule); }
    .proj-stat { background: var(--paper-2); padding: 10px 12px; }
    .proj-stat-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); font-family: var(--sans); margin-bottom: 4px; }
    .proj-stat-value { font-size: 14px; font-family: var(--sans); font-weight: 600; color: var(--ink); line-height: 1.2; }
    .proj-stat-value.pos { color: #1a7f4b; }
    .proj-stat-value.neg { color: #b91c1c; }
    .proj-stat-value.na  { color: var(--ink-3); font-weight: 400; font-style: italic; font-size: 12px; }
    .proj-stat-value.rate{ color: var(--isl-blue); }

.charts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 1px; background: var(--rule); }
    @media (max-width: 600px) { .charts-grid { grid-template-columns: 1fr; } }
    .chart-card { background: var(--paper); padding: 24px; }
    .chart-card-title { font-family: var(--serif); font-size: 18px; letter-spacing: -0.01em; color: var(--ink); margin-bottom: 2px; }
    .chart-card-sub { font-size: 11px; color: var(--ink-3); font-family: var(--sans); margin-bottom: 16px; }
    .chart-wrap { position: relative; height: 220px; }
    .chart-legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--ink-3); font-family: var(--sans); }
    .legend-dot { width: 10px; height: 10px; border-radius: 1px; flex-shrink: 0; }

  </style>
</head>
<body data-layout="editorial" data-density="balanced">

<div id="nav-root"></div>

<div class="trends-wrap">

<div class="trends-hero">
  <div class="hero-b-top">
    <div class="hero-b-left">
      <div class="hero-b-q serif">Trends</div>
      <div class="hero-b-divider"></div>
      <div class="hero-b-meta">
        <div class="hero-b-meta-name" id="trendsAgencyName">Loading…</div>
        <div class="hero-b-meta-range">Q1 · Q2 · Q3 · 2026</div>
      </div>
    </div>
    <div class="hero-b-type" style="display:flex;align-items:center;gap:16px;">
      <span id="progressLabel" style="color:var(--ink-3);font-size:12px;font-family:var(--sans);">calculating…</span>
      <span class="hero-progress-track" id="progressPill"><span class="hero-progress-fill" id="progressFill" style="width:0%"></span></span>
      <span id="updatedAt" style="color:var(--ink-4);font-size:12px;font-family:var(--sans);"></span>
    </div>
  </div>
</div>

  <section class="t-section">
    <div class="t-section-head">
      <div>
        <div class="t-section-label">Projections</div>
        <div class="t-section-title">Q3 Projected Finals</div>
        <div class="t-section-sub">Estimated end-of-quarter totals based on observed daily rate × total quarter days.</div>
      </div>
      <span class="t-badge">Q3 · Mar–May 2026</span>
    </div>
    <div class="proj-grid" id="projGrid"></div>
  </section>

  <section class="t-section">
    <div class="t-section-head">
      <div>
        <div class="t-section-label">Charts</div>
        <div class="t-section-title">Quarterly Trends</div>
        <div class="t-section-sub">Quarter-over-quarter trajectory with Q3 pace projections.</div>
      </div>
      <span class="t-badge">Q1 · Q2 · Q3</span>
    </div>
    <div class="charts-grid" id="chartsGrid"></div>
  </section>

</div>

<script type="module" src="./trends-app.js"></script>
</body>
</html>
