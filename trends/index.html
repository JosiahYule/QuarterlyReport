<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Integrated Staffing — Performance Trends</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../editorial.css" />

<script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
  /* Match the social + web reports — flush hero, no dividers, document-mode tuning */
  .report-wrap { padding-top: 0; }
  .hero { padding-top: 28px; }
  .nav-tabs a { white-space: nowrap; }
  .hero-b-meta-name, .hero-b-meta-range { display: block; }

  /* ---- Section heads — no top rule, editorial spacing ---- */
  .t-section { padding-top: var(--pad-y); padding-bottom: 0; }
  .t-section:first-of-type { padding-top: clamp(40px, 6vw, 64px); }
  .t-section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .t-section-label {
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-3); font-family: var(--sans); font-weight: 500;
    margin-bottom: 6px;
  }
  .t-section-title {
    font-family: var(--serif);
    font-size: clamp(28px, 3.4vw, 42px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .t-section-title em { font-style: italic; color: var(--isl-blue); }
  body[data-layout="document"] .t-section-title { font-size: clamp(22px, 2.6vw, 30px); }
  .t-section-sub {
    font-size: 14px; color: var(--ink-3); font-family: var(--sans);
    margin-top: 6px; max-width: 56ch;
  }
  .t-section-meta {
    font-family: var(--serif); font-style: italic;
    font-size: 16px; color: var(--ink-3);
    align-self: flex-start;
    padding-top: 6px;
  }
  .t-section-meta strong { font-style: normal; color: var(--ink); font-weight: 500; }

  /* ---- Projection cards — grid of editorial cells, hairline borders ---- */
  .proj-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0;
    border-top: 1px solid var(--ink);
    border-left: 1px solid var(--rule);
  }
  .proj-card {
    background: var(--paper);
    padding: 28px 24px 24px;
    display: flex; flex-direction: column;
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .proj-card-label {
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-3); font-family: var(--sans); font-weight: 500;
    margin-bottom: 18px;
  }
  .proj-number {
    font-family: var(--serif);
    font-size: clamp(38px, 4vw, 52px);
    line-height: 1;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums lining-nums;
  }
  .proj-number-sub {
    font-size: 12px; letter-spacing: 0.04em;
    color: var(--ink-3); font-family: var(--sans);
    margin-bottom: 24px;
  }
  .proj-track {
    height: 1px; background: var(--rule);
    margin-bottom: 8px; position: relative;
  }
  .proj-track-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--isl-blue);
    transition: width .6s ease;
  }
  .proj-track-labels {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--ink-4); font-family: var(--sans);
    margin-bottom: 20px;
  }
  .proj-stats {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px 20px;
    padding-top: 16px; border-top: 1px solid var(--rule);
    margin-top: auto;
  }
  .proj-stat-label {
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-4); font-family: var(--sans); font-weight: 500;
    margin-bottom: 4px;
  }
  .proj-stat-value {
    font-family: var(--serif); font-size: 16px;
    color: var(--ink); font-variant-numeric: tabular-nums lining-nums;
  }
  .proj-stat-value.pos { color: var(--up); }
  .proj-stat-value.neg { color: var(--down); }
  .proj-stat-value.pos::before, .proj-stat-value.neg::before {
    font-family: var(--serif); font-style: italic;
    margin-right: 4px;
  }
  .proj-stat-value.pos::before { content: "↑"; }
  .proj-stat-value.neg::before { content: "↓"; }

  /* ---- Charts grid — hairlines, no card chrome ---- */
  .charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 0;
    border-top: 1px solid var(--ink);
    border-left: 1px solid var(--rule);
  }
  .chart-card {
    background: var(--paper);
    padding: 28px 24px;
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .chart-card-title {
    font-family: var(--serif);
    font-size: 22px;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .chart-card-sub {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-4); font-family: var(--sans);
    margin-bottom: 22px;
  }
  .chart-wrap { position: relative; height: 220px; }
  .chart-legend {
    display: flex; flex-wrap: wrap; gap: 22px;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--rule);
  }
  .legend-item {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 12px; color: var(--ink-3); font-family: var(--sans);
  }
  .legend-bar {
    width: 14px; height: 2px;
    display: inline-block; transform: translateY(-3px);
    flex-shrink: 0;
  }

  .colophon {
    display: flex; align-items: baseline; justify-content: space-between;
    text-align: left; gap: 24px; flex-wrap: wrap;
  }
  .colophon .right { display: flex; gap: 18px; color: var(--ink-4); font-size: 12px; }
  .colophon .right em { font-family: var(--serif); font-style: italic; color: var(--ink-3); font-size: 13px; letter-spacing: 0; }
</style>
</head>
<body data-layout="document" data-density="balanced">

<div id="nav-root"></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="mock-trends.js"></script>
<script type="text/babel" src="../tweaks-panel.jsx"></script>
<script type="text/babel" src="../nav.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = { layout: "document", density: "balanced", accent: "isl" };

const D = window.TRENDS_MOCK;

function fmtN(n) {
  if (n === null || n === undefined || !Number.isFinite(n)) return "—";
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(2) + "M";
  if (n >= 10_000) return Math.round(n / 1000) + "K";
  if (n >= 1000) return (n / 1000).toFixed(1) + "K";
  return Math.round(n).toLocaleString();
}
function fmtExact(n) {
  if (n === null || n === undefined || !Number.isFinite(n)) return "—";
  return Math.round(n).toLocaleString();
}

function Hero() {
  const agencyCfg = getActiveAgencyConfig();
  const compPct = (D.quarterCompletion * 100).toFixed(0);
  return (
    <section className="hero wrap" data-screen-label="01 Hero">
      <div className="hero-b-top">
        <div className="hero-b-left">
          <div className="hero-b-q serif">Trends</div>
          <div className="hero-b-divider"></div>
          <div className="hero-b-meta">
            <div className="hero-b-meta-name">{agencyCfg.name}</div>
            <div className="hero-b-meta-range">Q1 — Q2 — Q3, 2026</div>
          </div>
        </div>
        <div className="hero-b-type">{compPct}% of Q3 elapsed</div>
      </div>
      <p className="hero-b-note serif">
        A three-quarter view of organic <em>social</em> performance, with end-of-quarter projections
        calibrated against the observed daily rate through day {D.daysElapsed} of {D.daysTotal}.
      </p>
    </section>
  );
}

function ProjCards() {
  const compPct = D.quarterCompletion * 100;
  return (
    <section className="section wrap" style={{ paddingBottom: 0 }} data-screen-label="02 Projections">
      <div className="t-section-head">
        <div>
          <div className="t-section-label">Projections</div>
          <h2 className="t-section-title serif">Q3 <em>Projected</em> Finals</h2>
          <div className="t-section-sub">
            Estimated end-of-quarter totals based on observed daily rate × total quarter days.
          </div>
        </div>
        <div className="t-section-meta">
          <strong>Day {D.daysElapsed}</strong> of {D.daysTotal} · {compPct.toFixed(0)}% complete
        </div>
      </div>
      <div className="proj-grid">
        {D.metrics.map(m => {
          const q3Done = D.quarterCompletion >= 1;
          const headline = q3Done ? m.q3ToDate : m.q3Projected;

          // For stock metrics (e.g. cumulative followers) treat the "rate" as
          // net additions per day, not the running total — otherwise rate-vs-Q2
          // is misleading. For flow metrics, the cumulative total IS the flow.
          const q3Flow = m.isStock ? (m.q3ToDate - m.q2)        : m.q3ToDate;
          const q2Flow = m.isStock ? (m.q2 - m.q1)              : m.q2;
          const q2Days = 92;

          const dailyRate   = q3Flow / D.daysElapsed;
          const q2DailyRate = q2Flow / q2Days;
          const rateVsQ2    = q2DailyRate > 0 ? ((dailyRate - q2DailyRate) / q2DailyRate) * 100 : 0;
          const rateCls     = rateVsQ2 > 1 ? "pos" : rateVsQ2 < -1 ? "neg" : "";

          const q3ToDateLabel = m.isStock ? "Q3 Net New"  : "Q3 to Date";
          const q2ActualLabel = m.isStock ? "Q2 Net New"  : "Q2 Actual";

          return (
            <div className="proj-card" key={m.id}>
              <div className="proj-card-label">{m.label}</div>
              <div className="proj-number num">{fmtN(headline)}</div>
              <div className="proj-number-sub">{q3Done ? "Q3 Final" : "Projected Final · Q3"}</div>

              <div className="proj-track">
                <div className="proj-track-fill" style={{ width: `${Math.min(100, compPct).toFixed(1)}%` }}></div>
              </div>
              <div className="proj-track-labels">
                <span>Day {D.daysElapsed} of {D.daysTotal}</span>
                <span>{compPct.toFixed(0)}%</span>
              </div>

              <div className="proj-stats">
                <div>
                  <div className="proj-stat-label">{q3ToDateLabel}</div>
                  <div className="proj-stat-value num">{fmtExact(q3Flow)}</div>
                </div>
                <div>
                  <div className="proj-stat-label">Daily Rate</div>
                  <div className="proj-stat-value num">{dailyRate.toFixed(1)}/day</div>
                </div>
                <div>
                  <div className="proj-stat-label">Rate vs Q2</div>
                  <div className={"proj-stat-value num " + rateCls}>{Math.abs(rateVsQ2).toFixed(1)}%</div>
                </div>
                <div>
                  <div className="proj-stat-label">{q2ActualLabel}</div>
                  <div className="proj-stat-value num">{fmtExact(q2Flow)}</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </section>
  );
}

function ChartCard({ metric }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || typeof Chart === "undefined") return;
    const ctx = ref.current.getContext("2d");

    // Editorial palette — ink for Q1/Q2 (with tonal split), isl-blue for the projection
    const inkColor = getComputedStyle(document.documentElement).getPropertyValue("--ink").trim() || "#14110d";
    const inkLight = getComputedStyle(document.documentElement).getPropertyValue("--ink-3").trim() || "#6a655d";
    const accent   = getComputedStyle(document.documentElement).getPropertyValue("--isl-blue").trim() || "#0a4d8c";

    const chart = new Chart(ctx, {
      type: "bar",
      data: {
        labels: ["Q1", "Q2", "Q3 · projected"],
        datasets: [{
          data: [metric.q1, metric.q2, metric.q3Projected],
          backgroundColor: [inkLight, inkColor, accent],
          borderWidth: 0,
          borderRadius: 0,
          borderSkipped: false,
          barPercentage: 0.62,
          categoryPercentage: 0.78,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 480, easing: "easeOutQuart" },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label(c) {
                const v = c.parsed.y;
                return Math.round(v).toLocaleString() + (c.dataIndex === 2 ? " (projected)" : "");
              },
            },
            displayColors: false,
            backgroundColor: inkColor,
            titleFont: { family: "Inter Tight, system-ui", size: 11, weight: "500" },
            bodyFont:  { family: "Inter Tight, system-ui", size: 13 },
            padding: 10,
            cornerRadius: 0,
          },
        },
        scales: {
          x: {
            grid: { display: false },
            border: { display: false },
            ticks: {
              font: { size: 11, family: "Inter Tight, system-ui" },
              color: inkLight,
            },
          },
          y: {
            beginAtZero: true,
            grid: { color: "rgba(20,17,13,0.06)", drawTicks: false },
            border: { display: false },
            ticks: {
              font: { size: 11, family: "Inter Tight, system-ui" },
              color: inkLight,
              padding: 8,
              maxTicksLimit: 5,
              callback: v => v >= 1000 ? (v / 1000) + "k" : v,
            },
          },
        },
      },
    });
    return () => chart.destroy();
  }, [metric]);

  return (
    <div className="chart-card">
      <div className="chart-card-title serif">{metric.label}</div>
      <div className="chart-card-sub">Q1 &amp; Q2 actuals · Q3 pace projection</div>
      <div className="chart-wrap"><canvas ref={ref}></canvas></div>
      <div className="chart-legend">
        <span className="legend-item"><span className="legend-bar" style={{ background: "var(--ink-3)" }}></span>Q1 actual</span>
        <span className="legend-item"><span className="legend-bar" style={{ background: "var(--ink)" }}></span>Q2 actual</span>
        <span className="legend-item"><span className="legend-bar" style={{ background: "var(--isl-blue)" }}></span>Q3 projected</span>
      </div>
    </div>
  );
}

function Charts() {
  const [chartReady, setChartReady] = useState(typeof Chart !== "undefined");
  useEffect(() => {
    if (chartReady) return;
    const i = setInterval(() => {
      if (typeof Chart !== "undefined") { setChartReady(true); clearInterval(i); }
    }, 80);
    return () => clearInterval(i);
  }, [chartReady]);

  return (
    <section className="section wrap" data-screen-label="03 Trends">
      <div className="t-section-head">
        <div>
          <div className="t-section-label">Charts</div>
          <h2 className="t-section-title serif">Quarterly <em>trends</em></h2>
          <div className="t-section-sub">
            Quarter-over-quarter trajectory with Q3 pace projections.
          </div>
        </div>
        <div className="t-section-meta">
          Q1 · Q2 · <strong>Q3 projected</strong>
        </div>
      </div>
      {chartReady && (
        <div className="charts-grid">
          {D.metrics.map(m => <ChartCard key={m.id} metric={m} />)}
        </div>
      )}
    </section>
  );
}

function Colophon() {
  return (
    <footer className="wrap colophon">
      <span>Prepared by Josiah Yule</span>
      <span className="right">
        <em>Updated</em> {D.generatedLabel}
        <span>·</span>
        <span>Edmonton, AB</span>
      </span>
    </footer>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    document.body.setAttribute("data-layout", t.layout);
    document.body.setAttribute("data-density", t.density);
  }, [t.layout, t.density]);

  useEffect(() => {
    renderNav("trends", null, null);
    // Defer the hide so React has time to mount the loading screen first.
    setTimeout(hideLoadingScreen, 60);
  }, []);

  return (
    <React.Fragment>
      <main className="report-wrap">
        <Hero />
        <ProjCards />
        <Charts />
      </main>
      <Colophon />
      <TweaksPanel title="Tweaks">
        <TweakSection label="Layout">
          <TweakRadio label="Mode" value={t.layout} onChange={v => setTweak("layout", v)} options={[{value:"editorial",label:"Editorial"},{value:"apple",label:"Apple"},{value:"document",label:"Document"}]} />
          <TweakRadio label="Density" value={t.density} onChange={v => setTweak("density", v)} options={[{value:"airy",label:"Airy"},{value:"balanced",label:"Balanced"},{value:"tight",label:"Tight"}]} />
        </TweakSection>
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
