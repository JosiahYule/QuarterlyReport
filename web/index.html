<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Website Report</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../editorial.css" />

<style>
  .channel-row-web {
    display: grid;
    grid-template-columns: 0.4fr 1.6fr repeat(3, 1fr);
    gap: 24px;
    align-items: baseline;
    padding: 32px 0;
    border-top: 1px solid var(--rule);
  }
  .channel-row-web:last-child { border-bottom: 1px solid var(--rule); }
  body[data-density="tight"] .channel-row-web { padding: 18px 0; }
  .channel-row-web.is-head { padding: 12px 0; border-top: 0; border-bottom: 1px solid var(--ink); }
  .channel-row-web.is-head > div { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; }
  .channel-row-web.is-head .col-num { text-align: right; }

  .pages-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
  .page-tile { padding: 28px 24px; border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
  .page-tile:nth-child(4n) { border-right: 0; }
  .page-tile:nth-last-child(-n+4) { border-bottom: 0; }
  .page-tile-name { font-family: var(--serif); font-size: 18px; margin-bottom: 20px; color: var(--ink); line-height: 1.2; }
  .page-stat { margin-bottom: 14px; }
  .page-stat-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-4); font-weight: 500; margin-bottom: 4px; }
  .page-stat-value { font-family: var(--serif); font-size: 22px; color: var(--ink); }
  .page-delta { font-size: 17px; margin-left: 10px; font-weight: 600; }

  @media (max-width: 880px) {
    .pages-grid { grid-template-columns: repeat(2, 1fr); }
    .page-tile:nth-child(2n) { border-right: 0; }
    .channel-row-web { grid-template-columns: 1fr 1fr; row-gap: 12px; }
  }
  @media (max-width: 560px) {
    .pages-grid { grid-template-columns: 1fr; }
    .page-tile { border-right: 0; }
  }
</style>
</head>
<body data-layout="editorial" data-density="balanced">

<div id="nav-root"></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel" src="../nav.jsx"></script>
<script src="../tweaks-panel.jsx" type="text/babel"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const WEB_ENDPOINT = "https://script.google.com/macros/s/AKfycbwWpZWB_eP48AX_B4TkGgKjEJPGoB7y9ynpv74SWA3MiEtV-Kmd-0eV-ecfTIysbWY3CQ/exec";

const TWEAK_DEFAULTS = { layout: "editorial", density: "balanced", accent: "isl" };

const REPORT_META = {
  webq1: { quarter: "Q1", quarterWord: "One",   rangeLabel: "Sep – Nov 2025", issue: "1" },
  webq2: { quarter: "Q2", quarterWord: "Two",   rangeLabel: "Dec – Feb 2026", issue: "2" },
  webq3: { quarter: "Q3", quarterWord: "Three", rangeLabel: "Mar – May 2026", issue: "3" },
};

const fmtInt  = n => (typeof n === "number" && Number.isFinite(n)) ? n.toLocaleString() : "—";
const fmtPct  = n => (typeof n === "number" && Number.isFinite(n)) ? n.toFixed(1) + "%" : "—";
function fmtTime(sec) {
  if (typeof sec !== "number" || !Number.isFinite(sec)) return "—";
  const m = Math.floor(sec / 60), s = Math.round(sec % 60);
  return m + ":" + String(s).padStart(2, "0");
}
function parseDelta(d) {
  if (d == null) return { dir: "flat", pct: 0 };
  if (typeof d === "object" && "dir" in d) return d;
  if (typeof d === "object" && "direction" in d) return { dir: d.direction, pct: d.percent || 0 };
  if (typeof d !== "string") return { dir: "flat", pct: 0 };
  const s = d.trim();
  let dir = "flat";
  if (/^[▲↑]/.test(s)) dir = "up";
  else if (/^[▼↓]/.test(s)) dir = "down";
  const m = s.match(/-?\d+(\.\d+)?/);
  return { dir, pct: m ? Math.abs(parseFloat(m[0])) : 0 };
}
function arrow(dir) { return dir === "up" ? "↑" : dir === "down" ? "↓" : "—"; }
function getReportKey() { return (new URLSearchParams(window.location.search).get("report") || "webq3").toLowerCase(); }
function getPrevKey(key) { const m = key.match(/^(.*?)(\d+)$/i); if (!m) return null; const n = Number(m[2]); return n <= 1 ? null : m[1] + (n - 1); }
async function fetchReport(key) { const res = await fetch(`${WEB_ENDPOINT}?report=${key}&t=${Date.now()}`, { cache: "no-store" }); if (!res.ok) throw new Error("Fetch failed: " + res.status); return res.json(); }
function calcAutoDelta(cur, prev) {
  if (typeof cur !== "number" || typeof prev !== "number" || prev === 0) return null;
  const pct = ((cur - prev) / Math.abs(prev)) * 100;
  return { dir: pct > 0 ? "up" : pct < 0 ? "down" : "flat", pct: Math.abs(pct) };
}

function Hero({ reportKey, data }) {
  const meta = REPORT_META[reportKey] || REPORT_META.webq3;
  const agencyCfg = getActiveAgencyConfig();
  const note = typeof data.insights?.working === "string" ? data.insights.working.split("\n\n")[0] : `Website performance report for ${agencyCfg.name}.`;
  return (
    <section className="hero wrap">
      <div className="hero-kicker">Volume 2026 · {meta.quarter} Report · Website Analytics</div>
      <h1 className="hero-title serif">Quarter <em>{meta.quarterWord}</em></h1>
      <div className="hero-meta-row" role="list" aria-label="Report metadata">
        <div className="meta-pair" role="listitem"><span className="label">Reporting period</span><span className="value serif">{meta.rangeLabel}</span></div>
        <div className="meta-pair" role="listitem"><span className="label">Source</span><span className="value serif">GA4 · Squarespace</span></div>
        <div className="meta-pair" role="listitem"><span className="label">Property</span><span className="value serif">{agencyCfg.url.replace("https://", "")}</span></div>
        <div className="meta-pair" role="listitem"><span className="label">Generated</span><span className="value serif">{data.generatedAt ? new Date(data.generatedAt).toLocaleDateString() : "—"}</span></div>
      </div>
      <div className="hero-lede-row">
        <p className="hero-lede serif">{note}</p>
      </div>
    </section>
  );
}

const KPI_DEFS = [
  { key: "sessions",            label: "Total Visits",      fmt: fmtInt,  note: "all sessions this quarter" },
  { key: "users",               label: "Unique Users",      fmt: fmtInt,  note: "distinct visitors" },
  { key: "engagementRate",      label: "Engagement Rate",   fmt: fmtPct,  note: "meaningful sessions" },
  { key: "avgEngagementTimeSec",label: "Avg Time on Site",  fmt: fmtTime, note: "active engagement per visit" },
  { key: "actions",             label: "Candidate Actions", fmt: fmtInt,  note: "high-intent interactions" },
  { key: "formSubmissions",     label: "Form Submissions",  fmt: fmtInt,  note: "completed contact forms" },
];

function Numbers({ data, prevData }) {
  const o = data.overall || {}, prev = prevData?.overall || {};
  return (
    <section className="section wrap">
      <header className="section-head"><h2 className="section-title serif">The Numbers</h2></header>
      <div className="kpi-grid">
        {KPI_DEFS.map(k => {
          const v = o[k.key];
          const d = data.deltas?.[k.key] ? parseDelta(data.deltas[k.key]) : calcAutoDelta(v, prev[k.key]) || { dir: "flat", pct: 0 };
          return (
            <div className="kpi" key={k.key}>
              <div className="kpi-label">{k.label}</div>
              <div className="kpi-value num">{k.fmt(v)}</div>
              <div className="kpi-foot">
                <span className={"delta " + d.dir}><span className="arrow serif ital">{arrow(d.dir)}</span><span>{d.pct.toFixed(1)}%</span></span>
                <span className="delta-note">{k.note}</span>
              </div>
            </div>
          );
        })}
      </div>
    </section>
  );
}

function Channels({ data, prevData }) {
  const channels = data.channels || [], prevChannels = prevData?.channels || [];
  const prevMap = {}; prevChannels.forEach(c => { prevMap[c.name?.toLowerCase()] = c; });
  return (
    <section className="section wrap">
      <header className="section-head"><h2 className="section-title serif">Traffic Channels</h2></header>
      <div className="channels">
        <div className="channel-row-web is-head"><div></div><div>Channel</div><div className="col-num">Sessions</div><div className="col-num">Share</div><div className="col-num">Eng. Rate</div></div>
        {channels.map((c, i) => {
          const prev = prevMap[c.name?.toLowerCase()] || null;
          const sd = calcAutoDelta(c.sessions, prev?.sessions), ed = calcAutoDelta(c.engagementRate, prev?.engagementRate);
          return (
            <div className="channel-row-web" key={c.name}>
              <div className="channel-idx serif ital">{String(i + 1).padStart(2, "0")}</div>
              <div><div className="channel-name serif">{c.name}</div></div>
              <div className="col-num"><span className="big">{fmtInt(c.sessions)}</span>{sd && <span className={"delta " + sd.dir} style={{fontSize:12}}><span className="arrow serif ital">{arrow(sd.dir)}</span><span>{sd.pct.toFixed(1)}%</span></span>}</div>
              <div className="col-num"><span className="big">{fmtPct(c.shareOfTraffic)}</span></div>
              <div className="col-num"><span className="big">{fmtPct(c.engagementRate)}</span>{ed && <span className={"delta " + ed.dir} style={{fontSize:12}}><span className="arrow serif ital">{arrow(ed.dir)}</span><span>{ed.pct.toFixed(1)}%</span></span>}</div>
            </div>
          );
        })}
      </div>
    </section>
  );
}

function TopPages({ data, prevData }) {
  const pages = data.topPages || [], prevPages = prevData?.topPages || [];
  const prevMap = {}; prevPages.forEach(p => { prevMap[(p.key || p.name || "").toLowerCase()] = p; });
  return (
    <section className="section wrap">
      <header className="section-head"><h2 className="section-title serif">Top Pages</h2></header>
      <div className="pages-grid" style={{ borderTop: "1px solid var(--rule)", borderLeft: "1px solid var(--rule)" }}>
        {pages.map(p => {
          const prev = prevMap[(p.key || p.name || "").toLowerCase()] || null;
          const vd = calcAutoDelta(p.pageViews, prev?.pageViews), td = calcAutoDelta(p.avgTimeOnPageSec, prev?.avgTimeOnPageSec);
          return (
            <div className="page-tile" key={p.key}>
              <div className="page-tile-name">{p.key}</div>
              <div className="page-stat"><div className="page-stat-label">Page Views</div><div className="page-stat-value">{fmtInt(p.pageViews)}{vd && <span className={"page-delta delta " + vd.dir}><span className="arrow serif ital">{arrow(vd.dir)}</span><span>{vd.pct.toFixed(1)}%</span></span>}</div></div>
              <div className="page-stat"><div className="page-stat-label">Bounce Rate</div><div className="page-stat-value">{fmtPct(p.bounceRate)}</div></div>
              <div className="page-stat"><div className="page-stat-label">Avg Time</div><div className="page-stat-value">{fmtTime(p.avgTimeOnPageSec)}{td && <span className={"page-delta delta " + td.dir}><span className="arrow serif ital">{arrow(td.dir)}</span><span>{td.pct.toFixed(1)}%</span></span>}</div></div>
            </div>
          );
        })}
      </div>
    </section>
  );
}

function Notes({ data }) {
  const ins = data.insights || {};
  const toList = v => Array.isArray(v) ? v : typeof v === "string" && v.trim() ? v.split("\n\n").filter(Boolean) : ["No notes yet."];
  const sections = [
    { key: "working",    label: "Working",      sub: "momentum to preserve", cls: "working" },
    { key: "notWorking", label: "Not working",  sub: "habits to break",      cls: "notworking" },
    { key: "actions",    label: "Actions",      sub: "this quarter",         cls: "" },
    { key: "next",       label: "Next quarter", sub: "Q4 priorities",        cls: "" },
  ];
  return (
    <section className="section wrap">
      <header className="section-head"><h2 className="section-title serif">Editor's Notes</h2></header>
      <div className="notes">
        {sections.map(s => (
          <div className={"note " + s.cls} key={s.key}>
            <h4>{s.label} <em className="serif ital">— {s.sub}</em></h4>
            <ul>{toList(ins[s.key]).map((n, i) => <li key={i}>{n}</li>)}</ul>
          </div>
        ))}
      </div>
    </section>
  );
}

function Colophon({ reportKey }) {
  const meta = REPORT_META[reportKey] || REPORT_META.webq3;
  const agencyCfg = getActiveAgencyConfig();
  return (
    <footer className="wrap colophon">
      <div className="left serif">{agencyCfg.name} — Quarterly Website Report.<br />{meta.quarter} 2026, {meta.rangeLabel}.</div>
      <div className="right"><div className="upper">Internal — Do Not Distribute</div><div style={{ marginTop: 8 }}>Generated {new Date().toLocaleDateString()}</div></div>
    </footer>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [data, setData] = useState(null);
  const [prevData, setPrevData] = useState(null);
  const reportKey = getReportKey();
  const meta = REPORT_META[reportKey] || REPORT_META.webq3;

  useEffect(() => {
    document.body.setAttribute("data-layout", t.layout);
    document.body.setAttribute("data-density", t.density);
  }, [t.layout, t.density]);

useEffect(() => {
  renderNav("web", { key: reportKey, label: meta.quarter, rangeLabel: meta.rangeLabel }, true);
}, [reportKey]);

  useEffect(() => {
    if (data) hideLoadingScreen();
  }, [data]);

  useEffect(() => {
    (async () => {
      try {
        const current = await fetchReport(reportKey);
        setData(current);
        const prevKey = getPrevKey(reportKey);
        if (prevKey) { try { setPrevData(await fetchReport(prevKey)); } catch {} }
      } catch (err) { console.error(err); }
    })();
  }, [reportKey]);

  if (!data) return null;

  return (
    <React.Fragment>
      <main className="report-wrap">
        <Hero reportKey={reportKey} data={data} />
        <Numbers data={data} prevData={prevData} />
        <Channels data={data} prevData={prevData} />
        <TopPages data={data} prevData={prevData} />
        <Notes data={data} />
      </main>
      <Colophon reportKey={reportKey} />
      <TweaksPanel title="Tweaks">
        <TweakSection title="Layout">
          <TweakRadio label="Mode" value={t.layout} onChange={v => setTweak("layout", v)} options={[{value:"editorial",label:"Editorial"},{value:"apple",label:"Apple"},{value:"document",label:"Document"}]} />
          <TweakRadio label="Density" value={t.density} onChange={v => setTweak("density", v)} options={[{value:"airy",label:"Airy"},{value:"balanced",label:"Balanced"},{value:"tight",label:"Tight"}]} />
        </TweakSection>
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
