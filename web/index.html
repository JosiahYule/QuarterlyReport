<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Website Report</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../editorial.css" />

<style>
  .channel-row-web {
    display: grid;
    grid-template-columns: 0.4fr 1.6fr repeat(3, 1fr);
    gap: 24px;
    align-items: baseline;
    padding: 32px 0;
    border-top: 1px solid var(--rule);
  }
  .channel-row-web:last-child { border-bottom: 1px solid var(--rule); }
  body[data-density="tight"] .channel-row-web { padding: 18px 0; }
  .channel-row-web.is-head { padding: 12px 0; border-top: 0; border-bottom: 1px solid var(--ink); }
  .channel-row-web.is-head > div { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; }
  .channel-row-web.is-head .col-num { text-align: right; }

  .pages-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
  .page-tile { padding: 28px 24px; border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
  .page-tile:nth-child(4n) { border-right: 0; }
  .page-tile:nth-last-child(-n+4) { border-bottom: 0; }
  .page-tile-name { font-family: var(--serif); font-size: 18px; margin-bottom: 20px; color: var(--ink); line-height: 1.2; }
  .page-stat { margin-bottom: 14px; }
  .page-stat-label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-4); font-weight: 500; margin-bottom: 4px; }
  .page-stat-value { font-family: var(--serif); font-size: 22px; color: var(--ink); }
  .page-delta { font-size: 17px; margin-left: 10px; font-weight: 600; }

  @media (max-width: 880px) {
    .pages-grid { grid-template-columns: repeat(2, 1fr); }
    .page-tile:nth-child(2n) { border-right: 0; }
    /* Reset 4-col last-row rule, re-apply for 2-col layout */
    .page-tile:nth-last-child(-n+4) { border-bottom: 1px solid var(--rule); }
    .page-tile:nth-last-child(-n+2) { border-bottom: 0; }
    .channel-row-web { grid-template-columns: 1fr 1fr; row-gap: 12px; }
  }
  @media (max-width: 560px) {
    .pages-grid { grid-template-columns: 1fr; }
    .page-tile { border-right: 0; }
    /* In 1-col layout only the very last tile loses its border */
    .page-tile:nth-last-child(-n+2) { border-bottom: 1px solid var(--rule); }
    .page-tile:last-child { border-bottom: 0; }
  }
</style>
</head>
<body data-layout="editorial" data-density="balanced">

<div id="nav-root"></div>
<div id="root"></div>

<script type="module" src="./web-app.jsx"></script>
</body>
</html>
